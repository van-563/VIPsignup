<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>管理システム</title>

<style>

body{
font-family:"Hiragino Kaku Gothic ProN",Arial;
background:#f4f6fb;
padding:30px;
}

.login-box{
max-width:400px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#0b3a63;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:30px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#0b3a63;
color:white;
}

</style>

</head>

<body>

<!-- 登录界面 -->

<div class="login-box" id="loginBox">

<h2>管理者ログイン</h2>

<input type="text" id="username" placeholder="ユーザーID">

<input type="password" id="password" placeholder="パスワード">

<button onclick="login()">ログイン</button>

</div>

<!-- 后台界面 -->

<div id="adminPanel" style="display:none">

<h1>顧客登録管理</h1>

<table id="dataTable">

<thead>
<tr>

<th>顧客ID</th>
<th>氏名</th>
<th>年齢</th>
<th>電話番号</th>
<th>投資経験</th>
<th>期待利回り</th>
<th>年収</th>
<th>投資予定額</th>
<th>登録時間</th>

</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

// 登录账号密码
const ADMIN_USER = "admin";
const ADMIN_PASS = "woainizhongguo1949";

// Google Script API
const apiURL = "你的GoogleScriptAPI";

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user===ADMIN_USER && pass===ADMIN_PASS){

document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";

loadData();

}else{

alert("IDまたはパスワードが違います");

}

}

function loadData(){

fetch(apiURL)
.then(res=>res.json())
.then(data=>{

let rows="";

data.forEach(d=>{

rows+=`

<tr>

<td>${d.client_id}</td>
<td>${d.name}</td>
<td>${d.age}</td>
<td>${d.phone}</td>
<td>${d.experience}</td>
<td>${d.expected_return}</td>
<td>${d.income}</td>
<td>${d.fund}</td>
<td>${d.time}</td>

</tr>

`;

});

document.querySelector("#dataTable tbody").innerHTML=rows;

});

}

</script>

</body>
</html>
